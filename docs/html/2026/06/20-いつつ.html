				<p>肉体としての精神。</p>
				<p>肉体の呻きに反応する内奥的精神。</p>
				<p>外的環境に対して肉体を鈍麻させる超克的精神。</p>
				<p>記憶は沈静し、睡眠による忘却という丸みを経て、肉体は一日を始める。</p>

				<p>ある一点の穴のために、欲動が肉体を生成する。</p>
				<p>精神は、穴の周囲をぐるぐる回るか、乾いてしまうまえに穴を埋めるためになにかを注ぎ込むかの二択に迫られる。食欲と包括。</p>
