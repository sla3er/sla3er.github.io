					<p>世界は一体どうなっているのか？　――立ち上がる自己との終わらない対話。</p>
				</div>
				<h2 class="section-title">巛</h2>
				<p>私、幼児的空想という――個人の排泄物。</p>
				<p>他の人間種は？</p>
				<p>他人の目にはなれない。</p>
				<p>思うことは確かに自己なのか？　疑うことは確かに自己なのか？</p>
				<p>流れの中にあるとき、そのことに思いを馳せる必要はない。</p>
				<p>川を打ち砕く岩としての他者。</p>
				<p>川の流れとしての自己連綿。</p>
