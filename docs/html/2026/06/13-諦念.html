			<div class="header">
				<h1 class="title"><ruby>諦念<rt>ていねん</rt></ruby></h1>
				<div class="author emoji-gruv">🪐</div>
				<div class=date><time datetime=2026-06-13>2026.06.13</time></div>
			</div>
			<div class="indent">
				<div class="abstract">
					<p>ただの暇つぶし。</p>
				</div>
				<h2 class="section-title">行く先先</h2>
				<div class="poem">
					<div class="poem-title">えっちらほっちら</div>
					<p>ああ、発出せねば、虚ろなる人人よ。</p>
					<p>空虚さ。何かを求めつつ満たされず。からっぽ。頭が仕えず。蚯蚓のような。</p>
					<p>ああ、なぜ虐げ合うのか？</p>
					<p>世界を嗜むフェーズ。</p>
					<p>世界を解体するフェーズ。</p>
					<p>世界。</p>
					<p>どこにいようが、どこに消えようが。</p>
					<p>ああ、なぜそこにいるのか。</p>
					<p>そこにいてもどうしようもないのに。</p>
					<p>ああ、なぜとどまるのか。</p>
					<p>べつのばしょにいけばいいというのに。</p>
					<p>どこにいようが、どこにむかおうが。</p>
				</div>
			</div>
