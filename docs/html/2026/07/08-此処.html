				<h2 class="section-title">枯山水</h2>
				<div class="poem">
					<div class="poem-title">澱み</div>
					<p>デスクとパソコンというテンプレート。</p>
					<p>今、ここにあること。スイッチの切り替わり。打感による操作性。</p>
					<p>人と人の出会い、挨拶というテンプレート。</p>
					<p>今、ここにあること。呼びかけと応答の反響。気分ののぼり鯉。</p>
					<p>卓袱台とテレビというテンプレート。</p>
					<p>今、ここにあること。咳払いによる身体の身震い。明滅するテレビジョン。</p>
					<p>照り返すよどみ。水と油。心臓の脈打つ先のイメージ、探るのは心臓という所在。</p>
					<p>定点観察。</p>
				</div>
			</div>
