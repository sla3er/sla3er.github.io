				<h2 class="section-title">石畳</h2>
				<p>てくてく歩いているけれど。</p>
				<div class="quote">
					哲学でも宗教でも、人間の心に媚びるものだけが繁盛する。進歩の名を名乗るものであれ、地獄の名を借りたものであれ同じことだ。劫罰を受けようがどうだろうが、人間は何ごとにつけても事の核心にいたいという絶対的な欲求を持っている。人間が人間であるのは、いや、人間に<span class="kenten">なった</span>のは、ただこの一点によるとさえいってよい。だからいつの日か、人間がこの種の欲求を身に覚えなくなったとしたら、人間は自分よりもっと傲慢な、もっと狂気じみた動物に道をゆずって消え去らねばなるまい。
					<span class="cite">エミール・シオラン『生誕の災厄』</span>
				</div>
