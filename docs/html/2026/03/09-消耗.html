				<div class="abstract">
					<p>気づかれ。</p>
				</div>
				<h2 class="section-title">無頭</h2>
				<p>考えることと動くこと、これらが乱舞しなければ、無意味さの入り込む余地が気力を削ぐ。考えさせるものがなければ、空転する。考える起点がなければ、考える起点が不明ならば、気の使い方が変わる。</p>
				<p>管理の方法の違い。</p>
				<p>ましかもしれない、何もしないことのほうが、時間を眺めることのほうが。</p>
				<div class="quote">
					私は何もしていない。そのことを承認しよう。だが私は、時間が過ぎゆくのを<span class="kenten">眺めている</span>。――時間を埋めようとするのよりは高級なはずである。
					<span class="cite">エミール・シオラン『生誕の災厄』</span>
				</div>
			</div>
