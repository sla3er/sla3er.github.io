				<h2 class="section-title">空気</h2>
				<p>話さないこと、話すこと。</p>
				<p>察知すること。</p>
				<p>眠ること。</p>
				<p>今日という日を忘れること、終えること。</p>
				<p>声の歪を整えること、内面の調整、表出するまでわからないということ。</p>
				<p>日課を無理に課す必要はないこと、日課は変わりうるということ。</p>
				<p>他者に求めないこと。</p>
				<p>陽にあたること。</p>
				<p>汗をかくこと。</p>
				<p>お腹を空かすこと。</p>
				<p>何よりも、他者に対したとき、彼らのことなど一ミリも分からないということを経験すること。</p>
