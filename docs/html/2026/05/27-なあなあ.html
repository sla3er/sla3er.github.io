				<div class="poem">
					<div class="poem-title">分裂すればただの脂肪</div>
					<p>ゆったりとした物腰。</p>
					<p>木を見て森を想像する。</p>
					<p>フェティッシュによる恋の拡張。</p>
					<p>想像の余地、死角による視覚の観劇。</p>
					<p>見えないことによる塗りたくりの余地。</p>
					<p>有ることは無いこと。</p>
					<p>幕間に栄えて。</p>
					<br>
					<p>知性の欠片もないよ。ただのおっぱいのことさ。</p>
