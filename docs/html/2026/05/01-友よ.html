				<h2 class="section-title">読書灯</h2>
				<div class="poem">
					<div class="poem-title">あらん限り</div>
					<p>なにもない。</p>
					<p>とどのつまり。</p>
					<p>なにもない。</p>
					<p>空虚に浮かぶ橋。</p>
					<p>淀みに佇む一人。</p>
					<br>
					<p>何を思う。</p>
					<p>この期に及んで。</p>
					<p>何を知る。</p>
					<p>この期に及んで。</p>
					<br>
					<p>消え入らんばかりの感情。</p>
					<p>移された灯火。</p>
				</div>
			</div>
