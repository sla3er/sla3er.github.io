					<p>意味付け。ひとめによる関係のなさ。</p>
					<p>飛躍ととるか、滞りの中の、思い出として、発露として。</p>

					<p>ながれる。</p>
					<p>とまる。</p>
					<p>流れていくものによる関係性の破綻からやがて涙となるもの。</p>
