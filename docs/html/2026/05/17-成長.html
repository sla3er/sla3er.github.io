			<div class="header">
				<h1 class="title"><ruby>成長<rt>せいちよう</rt></ruby></h1>
				<div class="author emoji-gruv">🎸</div>
				<div class=date><time datetime=2026-05-17>2026.05.17</time></div>

				<div class="abstract">
					<p>時おり奇跡と間違える。</p>
				</div>
				<h2 class="section-title">育つ</h2>
				<div class="poem">
					<div class="poem-title">病み上がりのブルース</div>
					<p>きっかけが来る。運命の。</p>
					<p>素通りする？　待ち構えてたんじゃないの？</p>
					<p>たいこの音がなってたのか。</p>
					<br>
					<p>毅然とできる？　今なら。</p>
					<p>前置きがあればね。</p>
					<p>使うのを忘れてた？　あたまってやつ。</p>
					<br>
					<p>動かせるのは手だけなの？　足だけなの？</p>
					<p>わすれてる。わすれてる。</p>
					<p>もういくつ寝るとお正月だろう？</p>
					<br>
					<p>きっかけがあればだよ。きっかけがあれば。</p>
					<p>これはまだやめられないよ。</p>
					<p>頼りねえな。</p>
				</div>
			</div>
